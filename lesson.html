  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html" class="mobile-link">Home</a>

  <!-- FOOTER -->
  <footer id="main-footer"></footer>

  <!-- SCRIPTS -->
  <script src="js/sanity.js"></script>
  <script src="js/nav.js"></script>
  <script>

    // ── RENDER RICH TEXT ──────────────────────────────────
    function renderBlock(blocks) {
      if (!blocks || blocks.length === 0) return ''

      return blocks.map(block => {

        // ── HTML EMBED ──────────────────────────────────
        if (block._type === 'htmlEmbed') {
          return `
            <div style="margin:28px 0;">
              ${block.label ? `
                <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;">
                  // ${block.label}
                </div>
              ` : ''}
              <div style="
                border:1px solid var(--border);border-radius:var(--radius);
                overflow:hidden;width:100%;height:${block.height || 400}px;
              ">
                <iframe
                  srcdoc="${block.html ? block.html.replace(/"/g, '&quot;') : ''}"
                  style="width:100%;height:100%;border:none;"
                  sandbox="allow-scripts allow-same-origin allow-forms"
                  loading="lazy"
                ></iframe>
              </div>
              ${block.caption ? `
                <div style="font-size:12px;color:var(--text3);margin-top:8px;font-style:italic;">
                  ${block.caption}
                </div>
              ` : ''}
            </div>
          `
        }

        // ── CODE BLOCK ────────────────────────────────────
        if (block._type === 'codeBlock') {
          const langColors = {
            cpp: '#00b4d8', c: '#00b4d8', python: '#ffd60a',
            javascript: '#ffd60a', html: '#ff6d00', css: '#52b788',
            bash: '#00e676', text: '#8fa3b0'
          }
          const langLabels = {
            cpp: 'Arduino / C++', c: 'C', python: 'Python',
            javascript: 'JavaScript', html: 'HTML', css: 'CSS',
            bash: 'Bash', text: 'Text'
          }
          const lang = block.language || 'text'
          const color = langColors[lang] || '#8fa3b0'
          const label = langLabels[lang] || lang
          const id = 'cb-' + Math.random().toString(36).substr(2, 9)

          return `
            <div style="margin:28px 0;">
              <div style="
                background:var(--bg3);border:1px solid var(--border);
                border-radius:var(--radius);overflow:hidden;
              ">
                <div style="
                  display:flex;justify-content:space-between;align-items:center;
                  padding:10px 16px;border-bottom:1px solid var(--border);
                  background:var(--bg4);
                ">
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;"></span>
                    <span style="font-family:var(--mono);font-size:10px;color:${color};letter-spacing:0.08em;">
                      ${label}
                    </span>
                    ${block.filename ? `
                      <span style="font-family:var(--mono);font-size:10px;color:var(--text3);">· ${block.filename}</span>
                    ` : ''}
                  </div>
                  <button id="copy-${id}" onclick="
                    navigator.clipboard.writeText(document.getElementById('code-${id}').innerText)
                      .then(() => {
                        document.getElementById('copy-${id}').textContent = 'Copied ✓'
                        setTimeout(() => document.getElementById('copy-${id}').textContent = 'Copy', 2000)
                      })
                  " style="
                    background:none;border:1px solid var(--border);
                    color:var(--text3);font-family:var(--mono);font-size:9px;
                    letter-spacing:0.08em;text-transform:uppercase;
                    padding:4px 10px;border-radius:3px;cursor:pointer;
                    transition:all 0.2s;
                  ">Copy</button>
                </div>
                <div style="overflow-x:auto;">
                  <pre style="margin:0;padding:20px;"><code id="code-${id}" style="
                    font-family:var(--mono);font-size:13px;
                    color:var(--text);line-height:1.7;
                    white-space:pre;display:block;
                  ">${block.code ? block.code.replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''}</code></pre>
                </div>
              </div>
              ${block.caption ? `
                <div style="font-size:12px;color:var(--text3);margin-top:8px;font-style:italic;">
                  ${block.caption}
                </div>
              ` : ''}
            </div>
          `
        }

        // ── CALLOUT BOX ───────────────────────────────────
        if (block._type === 'callout') {
          const calloutStyles = {
            info:      { bg: 'rgba(0,180,216,0.08)',  border: 'rgba(0,180,216,0.3)',  color: 'var(--blue)',   icon: 'ℹ️' },
            tip:       { bg: 'rgba(0,230,118,0.08)',  border: 'rgba(0,230,118,0.3)',  color: 'var(--green)',  icon: '💡' },
            warning:   { bg: 'rgba(255,214,10,0.08)', border: 'rgba(255,214,10,0.3)', color: 'var(--yellow)', icon: '⚠️' },
            important: { bg: 'rgba(255,109,0,0.08)',  border: 'rgba(255,109,0,0.3)',  color: 'var(--orange)', icon: '🔥' },
            success:   { bg: 'rgba(0,230,118,0.08)',  border: 'rgba(0,230,118,0.3)',  color: 'var(--green)',  icon: '✅' }
          }
          const s = calloutStyles[block.type] || calloutStyles.info
          return `
            <div style="
              background:${s.bg};border:1px solid ${s.border};
              border-left:3px solid ${s.color};
              border-radius:var(--radius);padding:16px 20px;margin:20px 0;
            ">
              ${block.title ? `
                <div style="
                  font-family:var(--cond);font-size:15px;font-weight:700;
                  text-transform:uppercase;color:#fff;
                  margin-bottom:6px;display:flex;align-items:center;gap:8px;
                ">
                  <span>${s.icon}</span> ${block.title}
                </div>
              ` : ''}
              <p style="font-size:14px;color:var(--text2);line-height:1.7;margin:0;">
                ${block.content}
              </p>
            </div>
          `
        }

        // ── IMAGE ─────────────────────────────────────────
        if (block._type === 'image') {
          const url = block.asset ? imageUrl(block) : null
          if (!url) return ''
          return `
            <div style="margin:28px 0;">
              <img src="${url}" alt="${block.alt || ''}"
                style="width:100%;border-radius:var(--radius);border:1px solid var(--border);">
              ${block.caption ? `
                <div style="font-size:12px;color:var(--text3);margin-top:8px;font-style:italic;text-align:center;">
                  ${block.caption}
                </div>
              ` : ''}
            </div>
          `
        }

        // ── STANDARD TEXT BLOCK ───────────────────────────
        if (block._type !== 'block') return ''

        const text = block.children ? block.children.map(child => {
          let t = (child.text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          if (!t) return ''

          if (child.marks && child.marks.length > 0) {

            // decorator marks
            child.marks.forEach(mark => {
              if (mark === 'strong') t = `<strong style="color:#fff;font-weight:600;">${t}</strong>`
              else if (mark === 'em') t = `<em>${t}</em>`
              else if (mark === 'underline') t = `<u>${t}</u>`
              else if (mark === 'highlight') t = `<mark style="background:rgba(255,214,10,0.25);color:#fff;padding:1px 4px;border-radius:2px;">${t}</mark>`
            })

            // annotation marks
            if (block.markDefs) {
              block.markDefs.forEach(def => {
                if (!child.marks.includes(def._key)) return

                if (def._type === 'link') {
                  t = `<a href="${def.href}" ${def.blank ? 'target="_blank"' : ''} style="color:var(--green);text-decoration:underline;">${t}</a>`
                }

                if (def._type === 'textStyle') {
                  const sizes = {
                    small: '12px', normal: '15px',
                    medium: '18px', large: '22px', xl: '28px'
                  }
                  const fonts = {
                    sans: "'Barlow', sans-serif",
                    mono: "'Space Mono', monospace",
                    cond: "'Barlow Condensed', sans-serif"
                  }
                  const colors = {
                    default: 'var(--text2)', green: 'var(--green)',
                    muted: 'var(--text3)', white: '#fff',
                    orange: 'var(--orange)', blue: 'var(--blue)',
                    yellow: 'var(--yellow)', red: '#ef4444'
                  }
                  const styleAttr = [
                    def.fontSize ? `font-size:${sizes[def.fontSize]}` : '',
                    def.fontFamily ? `font-family:${fonts[def.fontFamily]}` : '',
                    def.color ? `color:${colors[def.color]}` : ''
                  ].filter(Boolean).join(';')

                  if (styleAttr) t = `<span style="${styleAttr};">${t}</span>`
                }
              })
            }
          }

          return t
        }).join('') : ''

        if (!text.trim()) return ''

        switch (block.style) {
          case 'h1':
            return `<h1 style="font-family:var(--cond);font-size:36px;font-weight:900;text-transform:uppercase;color:#fff;margin:36px 0 14px;letter-spacing:-0.5px;">${text}</h1>`
          case 'h2':
            return `<h2 style="font-family:var(--cond);font-size:26px;font-weight:700;text-transform:uppercase;color:#fff;margin:32px 0 12px;">${text}</h2>`
          case 'h3':
            return `<h3 style="font-family:var(--cond);font-size:19px;font-weight:700;text-transform:uppercase;color:#fff;margin:24px 0 10px;">${text}</h3>`
          case 'blockquote':
            return `<blockquote style="border-left:3px solid var(--green);padding:12px 16px;margin:20px 0;font-style:italic;color:var(--text2);background:var(--bg2);border-radius:0 var(--radius) var(--radius) 0;">${text}</blockquote>`
          default:
            return `<p style="font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:16px;">${text}</p>`
        }

      }).join('')
    }

    // ── IMAGE URL BUILDER ─────────────────────────────────
    function imageUrl(source) {
      if (!source || !source.asset) return null
      const ref = source.asset._ref
      const parts = ref.split('-')
      const format = parts[parts.length - 1]
      const dimensions = parts[parts.length - 2]
      const id = parts.slice(1, parts.length - 2).join('-')
      return `https://cdn.sanity.io/images/${PROJECT_ID}/${DATASET}/${id}-${dimensions}.${format}`
    }

    // ── GET YOUTUBE EMBED ID ──────────────────────────────
    function getYouTubeId(url) {
      if (!url) return null
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/)
      return match ? match[1] : null
    }

    // ── FIND NEXT + PREV LESSON ───────────────────────────
    async function findAdjacentLessons(currentSlug, courseSlug) {
      if (!courseSlug) return { prev: null, next: null }
      const course = await getCourse(courseSlug)
      if (!course || !course.modules) return { prev: null, next: null }

      const allLessons = []
      course.modules.forEach(mod => {
        if (mod.lessons) mod.lessons.forEach(l => allLessons.push(l))
      })

      const currentIndex = allLessons.findIndex(l => l.slug.current === currentSlug)
      return {
        prev: currentIndex > 0 ? allLessons[currentIndex - 1] : null,
        next: currentIndex >= 0 && currentIndex < allLessons.length - 1
          ? allLessons[currentIndex + 1]
          : null
      }
    }

    // ── BUILD LEFT SIDEBAR ────────────────────────────────
    async function buildLeftSidebar(currentSlug, courseSlug) {
      if (!courseSlug) return ''
      const course = await getCourse(courseSlug)
      if (!course || !course.modules) return ''

      return `
        <div style="
          position:sticky;top:80px;
          max-height:calc(100vh - 100px);
          overflow-y:auto;
          background:var(--bg2);
          border:1px solid var(--border);
          border-radius:var(--radius);
        ">
          <div style="
            padding:16px 20px;
            border-bottom:1px solid var(--border);
            position:sticky;top:0;
            background:var(--bg2);z-index:1;
          ">
            <a href="course.html?slug=${courseSlug}" style="
              font-family:var(--mono);font-size:9px;
              letter-spacing:0.15em;text-transform:uppercase;
              color:var(--text3);text-decoration:none;
              display:flex;align-items:center;gap:6px;
              transition:color 0.2s;
            "
            onmouseover="this.style.color='var(--green)'"
            onmouseout="this.style.color='var(--text3)'">
              ← ${course.title}
            </a>
          </div>

          ${course.modules.map((mod, mi) => `
            <div>
              <div style="
                padding:10px 20px;
                background:var(--bg3);
                border-bottom:1px solid var(--border);
                font-family:var(--mono);font-size:9px;
                letter-spacing:0.15em;text-transform:uppercase;
                color:var(--text3);
              ">
                ${String(mi + 1).padStart(2,'0')} · ${mod.title}
              </div>
              ${mod.lessons && mod.lessons.length > 0 ? mod.lessons.map((lesson, li) => `
                <a href="lesson.html?slug=${lesson.slug.current}&course=${courseSlug}"
                  style="
                    display:flex;align-items:center;gap:10px;
                    padding:11px 20px;
                    border-bottom:1px solid var(--border);
                    text-decoration:none;
                    transition:background 0.2s;
                    background:${lesson.slug.current === currentSlug ? 'rgba(0,230,118,0.08)' : 'transparent'};
                    border-left:${lesson.slug.current === currentSlug ? '3px solid var(--green)' : '3px solid transparent'};
                  "
                  onmouseover="this.style.background='var(--bg3)'"
                  onmouseout="this.style.background='${lesson.slug.current === currentSlug ? 'rgba(0,230,118,0.08)' : 'transparent'}'"
                >
                  <span style="
                    font-family:var(--mono);font-size:9px;
                    color:${lesson.slug.current === currentSlug ? 'var(--green)' : 'var(--text3)'};
                    flex-shrink:0;min-width:20px;
                  ">${String(li + 1).padStart(2,'0')}</span>
                  <span style="
                    font-size:12px;
                    color:${lesson.slug.current === currentSlug ? '#fff' : 'var(--text2)'};
                    line-height:1.4;
                  ">${lesson.title}</span>
                  ${lesson.freePreview ? `
                    <span style="
                      font-family:var(--mono);font-size:8px;
                      color:var(--green);margin-left:auto;flex-shrink:0;
                    ">FREE</span>
                  ` : ''}
                </a>
              `).join('') : ''}
            </div>
          `).join('')}
        </div>
      `
    }

    // ── BUILD RIGHT SIDEBAR ───────────────────────────────
    function buildRightSidebar(lesson, courseSlug, hasQuiz) {
      return `
        <div style="position:sticky;top:80px;display:flex;flex-direction:column;gap:12px;">

          <!-- LESSON INFO -->
          <div style="
            background:var(--bg2);border:1px solid var(--border);
            border-radius:var(--radius);padding:20px;
          ">
            <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;">
              Lesson Info
            </div>
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${lesson.lessonId ? `
                <div>
                  <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;">ID</div>
                  <div style="font-family:var(--mono);font-size:11px;color:var(--green);">${lesson.lessonId}</div>
                </div>
              ` : ''}
              ${lesson.duration ? `
                <div>
                  <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;">Duration</div>
                  <div style="font-size:13px;color:var(--text);">${lesson.duration}</div>
                </div>
              ` : ''}
              ${lesson.freePreview ? `
                <div style="
                  padding:8px 12px;
                  background:rgba(0,230,118,0.08);
                  border:1px solid rgba(0,230,118,0.2);
                  border-radius:var(--radius);
                  font-family:var(--mono);font-size:9px;
                  letter-spacing:0.1em;text-transform:uppercase;
                  color:var(--green);text-align:center;
                ">✓ Free Preview</div>
              ` : ''}
            </div>
          </div>

          <!-- QUIZ SHORTCUT -->
          ${hasQuiz ? `
            <div style="
              background:var(--bg2);border:1px solid var(--border);
              border-radius:var(--radius);padding:20px;
            ">
              <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;">
                Lesson Quiz
              </div>
              <p style="font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:12px;">
                Test your understanding after watching the lesson.
              </p>
              <a href="lesson-quiz.html?lesson=${lesson.slug.current}&course=${courseSlug || ''}"
                class="btn-primary"
                style="display:block;text-align:center;font-size:11px;">
                Take Quiz →
              </a>
            </div>
          ` : ''}

          <!-- NAVIGATION -->
          <div id="next-lesson-btn" style="display:flex;flex-direction:column;gap:8px;">
            <div style="font-family:var(--mono);font-size:10px;color:var(--text3);">
              Loading...
            </div>
          </div>

        </div>
      `
    }

    // ── LOAD LESSON ───────────────────────────────────────
    async function loadLessonPage() {
      const slug = getParam('slug')
      const courseSlug = getParam('course')

      if (!slug) {
        window.location.href = 'courses.html'
        return
      }

      const lesson = await getLesson(slug)

      if (!lesson) {
        document.getElementById('lesson-content').innerHTML = `
          <div class="section">
            <div class="error-state">
              Lesson not found.
              <a href="courses.html" style="color:var(--green);">Back to courses</a>
            </div>
          </div>
        `
        return
      }

      document.title = `${lesson.title} — MechHub NG`

      const ytId = getYouTubeId(lesson.videoUrl)
      const hasQuiz = lesson.quiz && lesson.quiz.length > 0

      const leftSidebar = await buildLeftSidebar(slug, courseSlug)

      document.getElementById('lesson-content').innerHTML = `

        <!-- LESSON HEADER -->
        <div class="page-header">
          <a href="${courseSlug ? `course.html?slug=${courseSlug}` : 'courses.html'}"
            class="back-link">← Back to Course</a>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.1em;margin-bottom:12px;">
            ${lesson.lessonId ? `<span style="color:var(--green);">${lesson.lessonId}</span>` : ''}
            ${lesson.duration ? `· ${lesson.duration}` : ''}
            ${lesson.freePreview ? `· <span style="color:var(--green);">Free Preview</span>` : ''}
          </div>
          <h1 class="section-title">${lesson.title}</h1>
        </div>

        <!-- THREE COLUMN LAYOUT -->
        <div style="
          display:grid;
          grid-template-columns:240px 1fr 220px;
          gap:32px;
          padding:40px 2.5rem;
          align-items:start;
        ">

          <!-- LEFT SIDEBAR -->
          <div>${leftSidebar}</div>

          <!-- MAIN CONTENT -->
          <div>

            <!-- VIDEO -->
            ${ytId ? `
              <div class="video-wrap" style="margin-bottom:36px;">
                <iframe
                  src="https://www.youtube.com/embed/${ytId}"
                  allowfullscreen
                  title="${lesson.title}"
                ></iframe>
              </div>
            ` : ''}

            <!-- LESSON CONTENT -->
            ${lesson.content && lesson.content.length > 0 ? `
              <div style="margin-bottom:36px;">
                <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);margin-bottom:20px;">
                  // Lesson Notes
                </div>
                <div>${renderBlock(lesson.content)}</div>
              </div>
            ` : ''}

            <!-- QUIZ BANNER -->
            ${hasQuiz ? `
              <div style="
                background:var(--bg2);border:1px solid var(--border2);
                border-radius:var(--radius);padding:24px 28px;
                margin-bottom:36px;
                display:flex;justify-content:space-between;
                align-items:center;gap:20px;flex-wrap:wrap;
              ">
                <div>
                  <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);margin-bottom:8px;">
                    // Lesson Quiz
                  </div>
                  <div style="font-family:var(--cond);font-size:18px;font-weight:700;text-transform:uppercase;color:#fff;margin-bottom:4px;">
                    Test Your Understanding
                  </div>
                  <div style="font-size:13px;color:var(--text3);">
                    ${lesson.quiz.length} question${lesson.quiz.length !== 1 ? 's' : ''} — takes about ${Math.ceil(lesson.quiz.length * 1.5)} minutes
                  </div>
                </div>
                <a href="lesson-quiz.html?lesson=${lesson.slug.current}&course=${courseSlug || ''}"
                  class="btn-primary"
                  style="white-space:nowrap;">
                  Take the Quiz →
                </a>
              </div>
            ` : ''}

            <!-- BOTTOM NAVIGATION -->
            <div style="
              display:flex;justify-content:space-between;
              padding-top:24px;
              border-top:1px solid var(--border);
              flex-wrap:wrap;gap:12px;
            ">
              <a href="${courseSlug ? `course.html?slug=${courseSlug}` : 'courses.html'}"
                class="btn-ghost">
                ← Back to Course
              </a>
              <div id="next-lesson-bottom">
                <div style="font-family:var(--mono);font-size:11px;color:var(--text3);">
                  Loading...
                </div>
              </div>
            </div>

          </div>

          <!-- RIGHT SIDEBAR -->
          ${buildRightSidebar(lesson, courseSlug, hasQuiz)}

        </div>
      `

      loadAdjacentLessons(slug, courseSlug)
    }

    // ── LOAD ADJACENT LESSONS ─────────────────────────────
    async function loadAdjacentLessons(slug, courseSlug) {
      const { prev, next } = await findAdjacentLessons(slug, courseSlug)

      const rightNav = document.getElementById('next-lesson-btn')
      if (rightNav) {
        rightNav.innerHTML = `
          ${prev ? `
            <a href="lesson.html?slug=${prev.slug.current}&course=${courseSlug}"
              class="btn-ghost"
              style="display:block;text-align:center;font-size:11px;">
              ← Prev Lesson
            </a>
          ` : ''}
          ${next ? `
            <a href="lesson.html?slug=${next.slug.current}&course=${courseSlug}"
              class="btn-primary"
              style="display:block;text-align:center;font-size:11px;">
              Next Lesson →
            </a>
          ` : `
            <a href="course.html?slug=${courseSlug}"
              class="btn-primary"
              style="display:block;text-align:center;font-size:11px;">
              Complete ✓
            </a>
          `}
        `
      }

      const bottomNav = document.getElementById('next-lesson-bottom')
      if (bottomNav) {
        bottomNav.innerHTML = next ? `
          <a href="lesson.html?slug=${next.slug.current}&course=${courseSlug}"
            class="btn-primary">
            Next Lesson →
          </a>
        ` : `
          <a href="course.html?slug=${courseSlug}"
            class="btn-primary">
            Complete Course ✓
          </a>
        `
      }
    }

    loadLessonPage()

  </script>

  <style>
    @media (max-width: 768px) {
      #lesson-content > div[style*="grid-template-columns:240px"] {
        display: flex !important;
        flex-direction: column !important;
      }
      #lesson-content > div[style*="grid-template-columns:240px"] > div:first-child {
        display: none;
      }
    }
  </style>

</body>
</html>
