<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course — MechHub NG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/components.css">
<style>
  @media (max-width: 768px) {
    .course-two-col {
      display: flex !important;
      flex-direction: column !important;
    }
    body {
      overflow-x: hidden;
    }
  }
</style> 
</head> 
<body>

  <!-- NAV -->
  <nav id="main-nav">
    <div class="nav-brand">
      <span class="nav-brand-dot"></span>
      MechHub<span class="nav-brand-accent">.NG</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="courses.html" class="nav-link active">Courses</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="community.html" class="nav-link">Community</a>
      <a href="resources.html" class="nav-link">Resources</a>
      <a href="faq.html" class="nav-link">FAQ</a>
      <a href="why.html" class="nav-link">Why This?</a>
    </div>
    <a href="courses.html" class="nav-cta">Start →</a>
    <button class="nav-mobile-toggle" id="mobile-toggle">☰</button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html" class="mobile-link">Home</a>
    <a href="courses.html" class="mobile-link">Courses</a>
    <a href="projects.html" class="mobile-link">Projects</a>
    <a href="community.html" class="mobile-link">Community</a>
    <a href="resources.html" class="mobile-link">Resources</a>
    <a href="faq.html" class="mobile-link">FAQ</a>
    <a href="why.html" class="mobile-link">Why This?</a>
  </div>

  <!-- PAGE CONTENT -->
  <div id="course-content">
    <div class="loading-state" style="padding:120px 2.5rem;">
      Loading course...
    </div>
  </div>

  <!-- FOOTER -->
  <footer id="main-footer"></footer>

  <!-- SCRIPTS -->
  <script src="js/sanity.js"></script>
  <script src="js/nav.js"></script>
  <script>

    function renderBlock(blocks) {
      if (!blocks) return ''
      return blocks.map(block => {
        if (block._type !== 'block') return ''
        const text = block.children.map(child => child.text).join('')
        switch (block.style) {
          case 'h2': return `<h2 style="font-family:var(--cond);font-size:24px;font-weight:700;text-transform:uppercase;color:#fff;margin:28px 0 12px;">${text}</h2>`
          case 'h3': return `<h3 style="font-family:var(--cond);font-size:18px;font-weight:700;text-transform:uppercase;color:#fff;margin:24px 0 10px;">${text}</h3>`
          default: return `<p style="font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:16px;">${text}</p>`
        }
      }).join('')
    }

    function countAllLessons(modules) {
      if (!modules) return 0
      return modules.reduce((total, mod) => {
        return total + (mod.lessons ? mod.lessons.length : 0)
      }, 0)
    }

    function getFirstLesson(modules) {
      if (!modules || modules.length === 0) return null
      for (const mod of modules) {
        if (mod.lessons && mod.lessons.length > 0) {
          return mod.lessons[0]
        }
      }
      return null
    }

    async function loadCoursePage() {
      const slug = getParam('slug')

      if (!slug) {
        window.location.href = 'courses.html'
        return
      }

      const course = await getCourse(slug)

      if (!course) {
        document.getElementById('course-content').innerHTML = `
          <div class="section">
            <div class="error-state">
              Course not found.
              <a href="courses.html" style="color:var(--green);">Back to courses</a>
            </div>
          </div>
        `
        return
      }

      document.title = `${course.title} — MechHub NG`

      const totalLessons = countAllLessons(course.modules)
      const firstLesson = getFirstLesson(course.modules)

      document.getElementById('course-content').innerHTML = `

        <!-- COURSE HEADER -->
        <div class="page-header">
          <a href="courses.html" class="back-link">← Back to Courses</a>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
            <span class="badge badge-${course.level}">${course.level}</span>
            <span class="badge" style="background:rgba(0,180,216,0.1);color:var(--blue);border:1px solid rgba(0,180,216,0.2);">
              ${course.pillar}
            </span>
            ${course.duration ? `
              <span style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 0;">
                ⏱ ${course.duration}
              </span>
            ` : ''}
            ${totalLessons > 0 ? `
              <span style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 0;">
                📚 ${totalLessons} lesson${totalLessons !== 1 ? 's' : ''}
              </span>
            ` : ''}
          </div>
          <h1 class="section-title">${course.title}</h1>
          <p class="section-sub">${course.description}</p>
          ${course.comingSoon ? `
            <div style="
              display:inline-block;
              background:rgba(255,214,10,0.1);
              border:1px solid rgba(255,214,10,0.3);
              color:var(--yellow);
              font-family:var(--mono);font-size:11px;
              letter-spacing:0.1em;text-transform:uppercase;
              padding:10px 20px;border-radius:var(--radius);
            ">
              ⏳ This course is coming soon
            </div>
          ` : ''}
        </div>

        <!-- COURSE BODY -->
        <div class="section">
          <div class="course-two-col" style="display:grid;grid-template-columns:2fr 1fr;gap:48px;align-items:start;">

            <!-- LEFT: MODULES + LESSONS -->
            <div>

              <!-- PREREQUISITES -->
              ${course.prerequisites && course.prerequisites.length > 0 ? `
                <div style="
                  background:var(--bg2);border:1px solid var(--border);
                  border-radius:var(--radius);padding:20px 24px;
                  margin-bottom:32px;
                ">
                  <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;">
                    Prerequisites
                  </div>
                  <ul style="list-style:none;display:flex;flex-direction:column;gap:6px;">
                    ${course.prerequisites.map(p => `
                      <li style="font-size:13.5px;color:var(--text2);display:flex;align-items:center;gap:8px;">
                        <span style="color:var(--green);font-family:var(--mono);">→</span> ${p}
                      </li>
                    `).join('')}
                  </ul>
                </div>
              ` : ''}

              <!-- OVERVIEW -->
              ${course.overview ? `
                <div style="margin-bottom:32px;">
                  <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);margin-bottom:16px;">
                    // Course Overview
                  </div>
                  <div style="max-width:640px;">
                    ${renderBlock(course.overview)}
                  </div>
                </div>
              ` : ''}

              <!-- MODULES -->
              ${course.modules && course.modules.length > 0 ? `
                <div>
                  <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);margin-bottom:16px;">
                    // Course Content — ${course.modules.length} Module${course.modules.length !== 1 ? 's' : ''} · ${totalLessons} Lesson${totalLessons !== 1 ? 's' : ''}
                  </div>
                  <div style="display:flex;flex-direction:column;gap:12px;">
                    ${course.modules.map((mod, mi) => `
                      <div style="
                        border:1px solid var(--border);
                        border-radius:var(--radius);
                        overflow:hidden;
                      ">
                        <!-- MODULE HEADER -->
                        <div style="
                          background:var(--bg3);
                          padding:18px 24px;
                          border-bottom:${mod.lessons && mod.lessons.length > 0 ? '1px solid var(--border)' : 'none'};
                          display:flex;align-items:flex-start;gap:16px;
                        ">
                          <div style="
                            font-family:var(--mono);font-size:11px;
                            font-weight:700;color:var(--green);
                            flex-shrink:0;margin-top:2px;
                          ">
                            ${String(mi + 1).padStart(2, '0')}
                          </div>
                          <div style="flex:1;">
                            <div style="
                              font-family:var(--cond);font-size:18px;
                              font-weight:700;text-transform:uppercase;
                              color:#fff;margin-bottom:${mod.description ? '6px' : '0'};
                            ">
                              ${mod.title}
                            </div>
                            ${mod.description ? `
                              <div style="font-size:13px;color:var(--text3);line-height:1.5;">
                                ${mod.description}
                              </div>
                            ` : ''}
                          </div>
                          <div style="
                            font-family:var(--mono);font-size:10px;
                            color:var(--text3);flex-shrink:0;
                          ">
                            ${mod.lessons ? mod.lessons.length : 0} lesson${mod.lessons && mod.lessons.length !== 1 ? 's' : ''}
                          </div>
                        </div>

                        <!-- LESSONS LIST -->
                        ${mod.lessons && mod.lessons.length > 0 ? `
                          <div style="background:var(--bg2);">
                            ${mod.lessons.map((lesson, li) => `
                              <a href="lesson.html?slug=${lesson.slug.current}&course=${slug}"
                                style="
                                  display:flex;align-items:center;gap:16px;
                                  padding:14px 24px;
                                  border-bottom:1px solid var(--border);
                                  text-decoration:none;
                                  transition:background 0.2s;
                                "
                                onmouseover="this.style.background='var(--bg3)'"
                                onmouseout="this.style.background='transparent'"
                              >
                                <div style="
                                  font-family:var(--mono);font-size:10px;
                                  color:var(--text3);flex-shrink:0;
                                  min-width:32px;
                                ">
                                  ${String(li + 1).padStart(2, '0')}
                                </div>
                                <div style="flex:1;">
                                  <div style="font-size:14px;color:var(--text);margin-bottom:3px;">
                                    ${lesson.title}
                                  </div>
                                  <div style="display:flex;gap:10px;align-items:center;">
                                    ${lesson.duration ? `
                                      <span style="font-family:var(--mono);font-size:9px;color:var(--text3);">
                                        ⏱ ${lesson.duration}
                                      </span>
                                    ` : ''}
                                    ${lesson.freePreview ? `
                                      <span style="font-family:var(--mono);font-size:9px;color:var(--green);">
                                        Free Preview
                                      </span>
                                    ` : ''}
                                  </div>
                                </div>
                                <div style="color:var(--text3);font-size:14px;flex-shrink:0;">→</div>
                              </a>
                            `).join('')}
                          </div>
                        ` : `
                          <div style="
                            padding:20px 24px;background:var(--bg2);
                            font-family:var(--mono);font-size:11px;
                            color:var(--text3);letter-spacing:0.05em;
                          ">
                            Lessons coming soon
                          </div>
                        `}
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : `
                <div class="error-state">No modules added yet — check back soon.</div>
              `}
            </div>

            <!-- RIGHT: SIDEBAR -->
            <div style="position:sticky;top:80px;">
              <div style="
                background:var(--bg2);border:1px solid var(--border);
                border-radius:var(--radius);padding:24px;
                margin-bottom:16px;
              ">
                <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:20px;">
                  Course Info
                </div>
                <div style="display:flex;flex-direction:column;gap:16px;">
                  <div>
                    <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Pillar</div>
                    <div style="font-size:13px;color:var(--text);text-transform:capitalize;">${course.pillar}</div>
                  </div>
                  <div>
                    <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Level</div>
                    <span class="badge badge-${course.level}">${course.level}</span>
                  </div>
                  ${course.duration ? `
                    <div>
                      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Duration</div>
                      <div style="font-size:13px;color:var(--text);">${course.duration}</div>
                    </div>
                  ` : ''}
                  ${totalLessons > 0 ? `
                    <div>
                      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Total Lessons</div>
                      <div style="font-size:13px;color:var(--text);">${totalLessons}</div>
                    </div>
                  ` : ''}
                  ${course.modules ? `
                    <div>
                      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Modules</div>
                      <div style="font-size:13px;color:var(--text);">${course.modules.length}</div>
                    </div>
                  ` : ''}
                </div>

                ${!course.comingSoon && firstLesson ? `
                  <a href="lesson.html?slug=${firstLesson.slug.current}&course=${slug}"
                    class="btn-primary"
                    style="display:block;text-align:center;margin-top:24px;">
                    Start Course →
                  </a>
                ` : ''}
              </div>

              <!-- SHARE -->
              <div style="
                background:var(--bg2);border:1px solid var(--border);
                border-radius:var(--radius);padding:20px 24px;
              ">
                <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;">
                  Share this Course
                </div>
                <button onclick="navigator.clipboard.writeText(window.location.href).then(() => this.textContent = 'Copied!')" style="
                  background:none;border:1px solid var(--border);
                  color:var(--text2);font-family:var(--mono);
                  font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
                  padding:10px 16px;border-radius:var(--radius);
                  cursor:pointer;width:100%;transition:all 0.2s;
                ">
                  Copy Link
                </button>
              </div>
            </div>

          </div>
        </div>
      `
    }

    loadCoursePage()
  </script>

</body>
</html>
